<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Shop | Paws & Claws Vet Clinic</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="home_style.css">
    <style>
        /* Navigation styles */
        .nav-link {
            color: #4A628A !important;
            font-weight: 500;
        }
        
        .nav-link.active {
            font-weight: 600;
        }
        
        .btn-outline-primary {
            color: #4A628A !important;
            border-color: #4A628A !important;
        }
        
        .btn-outline-primary:hover {
            background-color: #4A628A !important;
            color: white !important;
        }
        
        .btn-primary {
            background-color: #4A628A !important;
            border-color: #4A628A !important;
        }
        
        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }
        
        .category-pill {
            background-color: #f0f4f9;
            color: #4A628A;
            border: 1px solid #d8e2f3;
            transition: all 0.2s ease;
        }
        
        .category-pill:hover, .category-pill.active {
            background-color: #4A628A;
            color: white;
            border-color: #4A628A;
        }
        
        /* Cart Styles */
        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100vh;
            background-color: white;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            z-index: 1050;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .cart-sidebar.show {
            right: 0;
        }
        
        .cart-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0,0,0,0.5);
            z-index: 1040;
            display: none;
        }
        
        .cart-backdrop.show {
            display: block;
        }
        
        .cart-header {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .cart-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .cart-item-icon {
            width: 40px;
            height: 40px;
            background-color: #f0f4f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4A628A;
            margin-right: 10px;
        }
        
        .cart-item-details {
            flex: 1;
        }
        
        .cart-item-details h6 {
            margin: 0;
            font-size: 0.9rem;
        }
        
        .cart-item-details .price {
            color: #4A628A;
            font-weight: 500;
            font-size: 0.85rem;
        }
        
        .cart-item-quantity {
            display: flex;
            align-items: center;
            margin: 0 10px;
        }
        
        .cart-item-quantity button {
            width: 25px;
            height: 25px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .cart-item-quantity span {
            margin: 0 8px;
            min-width: 20px;
            text-align: center;
        }
        
        .cart-footer {
            padding: 15px;
            border-top: 1px solid #eee;
        }
        
        .cart-total {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .total-amount {
            color: #4A628A;
            font-size: 1.1rem;
        }
        
        .empty-cart {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #aaa;
        }
        
        .cart-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1060;
            width: 300px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="client_home.html">
                <div>
                    <div style="color: #4A628A; font-size: 22px; font-weight: 500; line-height: 1.2;">Paws & Claws</div>
                    <div style="color: #000000; font-size: 18px; line-height: 1.2;">Client Portal</div>
                </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="client_home.html" style="color: #4A628A;"><i class="fas fa-home me-1"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="client_appointments.html" style="color: #4A628A;"><i class="fas fa-calendar me-1"></i> Appointments</a></li>
                    <li class="nav-item"><a class="nav-link" href="client_pets.html" style="color: #4A628A;"><i class="fas fa-paw me-1"></i> My Pets</a></li>
                    <li class="nav-item"><a class="nav-link" href="client_orders.html" style="color: #4A628A;"><i class="fas fa-shopping-bag me-1"></i> Orders</a></li>
                    <li class="nav-item"><a class="nav-link active" href="client_shop.html" style="color: #4A628A; font-weight: 600;"><i class="fas fa-store me-1"></i> Shop</a></li>
                    <li class="nav-item"><a class="nav-link" href="client_payments.html" style="color: #4A628A;"><i class="fas fa-credit-card me-1"></i> Payments</a></li>
                    <li class="nav-item ms-lg-2">
                        <button class="btn btn-outline-primary position-relative" onclick="showCartSidebar()">
                            <i class="fas fa-shopping-cart me-1"></i> Cart
                            <span id="cartBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="display: none;">0</span>
                        </button>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <a class="btn btn-outline-primary" href="#" onclick="handleLogout()" style="color: #4A628A; border-color: #4A628A;">
                            <i class="fas fa-sign-out-alt me-1"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-5">
        <div class="row">
            <!-- Products -->
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2 style="color: #4A628A;">Shop Products</h2>
                    <div class="d-flex align-items-center">
                        <div class="input-group me-3" style="width: 250px;">
                            <input type="text" class="form-control" placeholder="Search products...">
                            <button class="btn btn-outline-secondary" type="button">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                        <select class="form-select" style="width: 150px;">
                            <option selected>Sort by</option>
                            <option>Price: Low to High</option>
                            <option>Price: High to Low</option>
                            <option>Newest</option>
                            <option>Popular</option>
                        </select>
                    </div>
                </div>
                
                <div class="d-flex flex-wrap gap-2 mb-4">
                    <button class="btn rounded-pill category-pill active">All</button>
                    <button class="btn rounded-pill category-pill">Dog Food</button>
                    <button class="btn rounded-pill category-pill">Cat Food</button>
                    <button class="btn rounded-pill category-pill">Medications</button>
                    <button class="btn rounded-pill category-pill">Accessories</button>
                    <button class="btn rounded-pill category-pill">Treats</button>
                </div>
                
                <!-- Products Container -->
                <div class="row g-4" id="productsContainer">
                    <!-- Products will be dynamically inserted here by JavaScript -->
                </div>
                
                <!-- Pagination -->
                <nav class="mt-5">
                    <ul class="pagination justify-content-center">
                        <li class="page-item disabled">
                            <a class="page-link" href="#" tabindex="-1" aria-disabled="true">Previous</a>
                        </li>
                        <li class="page-item active"><a class="page-link" href="#" style="background-color: #4A628A; border-color: #4A628A;">1</a></li>
                        <li class="page-item"><a class="page-link" href="#">2</a></li>
                        <li class="page-item"><a class="page-link" href="#">3</a></li>
                        <li class="page-item">
                            <a class="page-link" href="#">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-light py-4">
        <div class="container text-center">
            <p class="text-muted mb-0">&copy; 2023 Paws & Claws Vet Clinic. All rights reserved.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="client-side-auth.js"></script>
    <script src="client_shop.js"></script>
</body>
</html>
