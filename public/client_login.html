<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login | Paws & Claws Vet Clinic</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <img src="assets/images/logo.png" alt="Paws & Claws Logo" height="80" class="mb-3">
                            <h3 class="text-primary">Client Login</h3>
                            <p class="text-muted">Enter your credentials to access your pet portal</p>
                        </div>
                        
                        <div id="loginError" class="alert alert-danger d-none" role="alert">
                            Invalid email or password. Please try again.
                        </div>
                        
                        <form id="clientLoginForm">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email" required placeholder="Enter your email">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
                                <div class="text-end mt-2">
                                    <a href="#" class="text-decoration-none small">Forgot Password?</a>
                                </div>
                            </div>
                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label" for="rememberMe">Remember me</label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                        </form>
                        
                        <hr class="my-4">
                        
                        <div class="text-center">
                            <p class="mb-2">Don't have an account?</p>
                            <a href="client_signup.html" class="btn btn-outline-primary">Sign Up</a>
                        </div>
                        
                        <div class="text-center mt-4">
                            <p class="text-muted">
                                Are you an administrator? 
                                <a href="admin_login.html" class="text-primary" onclick="window.location.href='admin_login.html'; return false;">Admin Login</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS - Make sure client-side-auth.js comes BEFORE client_login.js -->
    <script src="client-side-auth.js"></script>
    <script src="client_login.js"></script>
</body>
</html>
